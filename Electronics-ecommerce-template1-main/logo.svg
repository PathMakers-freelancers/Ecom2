<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="plugGrad" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
  </defs>

  <!-- Circular background -->
  <circle cx="50" cy="50" r="48" fill="url(#plugGrad)" />

  <!-- Plug body (rectangle at bottom) -->
  <rect x="36" y="54" width="28" height="18" rx="4" fill="white" />

  <!-- Plug cord (line going down) -->
  <line x1="50" y1="72" x2="50" y2="86" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Left prong -->
  <rect x="33" y="36" width="8" height="22" rx="3" fill="white" />

  <!-- Right prong -->
  <rect x="59" y="36" width="8" height="22" rx="3" fill="white" />
</svg>
